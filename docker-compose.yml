services:
  # Load Balancer / Reverse Proxy
  gateway:
    image: nginx:alpine
    container_name: proxy_service
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

  # Backend API
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
      args:
        APP_VERSION: 1.2.0
    environment:
      - DB_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/myapp
      - CACHE_HOST=redis
    volumes:
      - ./backend:/app:z
      - api_logs:/var/log/api

  # State Layer - Redis
  redis:
    image: redis:7-bitnami
    command: ["redis-server", "--appendonly", "yes"]

  # Persistent Data - PostgreSQL
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env.db
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
